<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 7: Table Styling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Upcoming Community Events Admin View</h2>
    
    <table class="events-table">
        <thead>
            <tr>
                <th>Event ID</th>
                <th>Event Name</th>
                <th>Date</th>
                <th>Location</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>001</td>
                <td>Town Hall Meeting</td>
                <td>Oct 12, 2023</td>
                <td>City Hall</td>
                <td>Confirmed</td>
            </tr>
            <tr>
                <td>002</td>
                <td>Charity Run 5K</td>
                <td>Oct 15, 2023</td>
                <td>Central Park</td>
                <td>Pending</td>
            </tr>
            <tr>
                <td>003</td>
                <td>Farmers Market</td>
                <td>Oct 20, 2023</td>
                <td>Town Square</td>
                <td>Confirmed</td>
            </tr>
            <tr>
                <td>004</td>
                <td>Art Exhibition</td>
                <td>Nov 01, 2023</td>
                <td>Community Center</td>
                <td>Planning</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
