<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 10: Responsive Web Design</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <h1>Local Community Portal</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Welcome to our Community!</h2>
            <p>We are a vibrant, growing community. Check out our latest events and connect with your neighbors.</p>
            <img src="https://via.placeholder.com/800x400" alt="Community gathering" class="responsive-img">
        </section>

        <section class="grid-container">
            <div class="grid-item">Event 1</div>
            <div class="grid-item">Event 2</div>
            <div class="grid-item">Event 3</div>
        </section>
    </main>

</body>
</html>
