<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 6: Link and List Styling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="main-nav">
        <ul class="nav-menu">
            <li><a href="#home">Home</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="#about">About Us</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="resources">
            <h2>Community Resources</h2>
            <ul class="resource-list">
                <li>Library Timings</li>
                <li>Public Transport Schedule</li>
                <li>Emergency Contacts</li>
                <li>City Hall Information</li>
            </ul>
        </section>

        <section class="sponsors">
            <h2>Our Sponsors</h2>
            <p>Visit <a href="https://example.com" class="external-link" target="_blank">our partner's website</a> for more details.</p>
        </section>
    </main>

</body>
</html>
