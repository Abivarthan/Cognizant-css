<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 5: Typography - Fonts and Text</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1 class="main-title">Community Marketing Campaign</h1>
    </header>

    <main>
        <article class="announcement">
            <h2 class="sub-title">Improved Readability</h2>
            <p class="description">
                The marketing team wants more appealing fonts and better readability. 
                This text should be clean, spaced out perfectly, and very easy on the eyes.
            </p>
            <p class="highlight-text">
                Don't miss out on the grand opening this weekend!
            </p>
        </article>
    </main>

</body>
</html>
